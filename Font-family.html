<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Ejemplo font-family</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
    p.serif {
      font-family: "Times New Roman", Times, serif;
    }

    p.sansserif {
      font-family: Arial, Helvetica, sans-serif;
    }
    </style>
</head>
<body>

<h1>CSS font-family</h1>
<p class="serif">Esto es un párrafo escrito con la fuente serif Times New Roman.</p>
<p class="sansserif">Este es un párrafo escrito con la fuente sans-serif Arial .</p>

</body>
</html>
