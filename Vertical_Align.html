<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>vertical-align</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    pre { font-weight: bold; }
</style>
</head>

<body>
    <pre>Alineación:  sub,      bottom,   middle, text-bottom, baseline, text-top,   top,      super.
<span style="text-decoration:underline overline">Ejemplo:    <img src="images/gnu-head-sm.jpg" width="64" height="61" alt="Logotipo de GNU" title="Logotipo de GNU" style="vertical-align: sub">  <img src="images/gnu-head-sm.jpg" width="64" height="61" alt="Logotipo de GNU" title="Logotipo de GNU" style="vertical-align: bottom">  <img src="images/gnu-head-sm.jpg" width="64" height="61" alt="Logotipo de GNU" title="Logotipo de GNU" style="vertical-align: middle">  <img src="images/gnu-head-sm.jpg" width="64" height="61" alt="Logotipo de GNU" title="Logotipo de GNU" style="vertical-align: text-bottom">    <img src="images/gnu-head-sm.jpg" width="64" height="61" alt="Logotipo de GNU" title="Logotipo de GNU" style="vertical-align: baseline">  <img src="images/gnu-head-sm.jpg" width="64" height="61" alt="Logotipo de GNU" title="Logotipo de GNU" style="vertical-align: text-top">  <img src="images/gnu-head-sm.jpg" width="64" height="61" alt="Logotipo de GNU" title="Logotipo de GNU" style="vertical-align: top">  <img src="images/gnu-head-sm.jpg" width="64" height="61" alt="Logotipo de GNU" title="Logotipo de GNU" style="vertical-align: super">  </span></pre>
    <div></div>
    <pre>Alineación:  sub,    bottom,  middle, text-bottom, baseline,    text-top,  top,    super.
<span style="text-decoration:underline overline">Ejemplo:    <span style="font-size: 300%"><span style="vertical-align: sub">bq</span> <span style="vertical-align: bottom">bq</span> <span style="vertical-align:  middle">bq</span> <span style="vertical-align: text-bottom">bq</span>   <span style="vertical-align: baseline">bq</span>  <span style="vertical-align: text-top">bq</span> <span style="vertical-align: top">bq</span> <span style="vertical-align: super">bq</span></span>  </span></pre>
</body>
</html>
