<!DOCTYPE html>
<html>
<head>
    <style>
        p::first-line {
          color: #ff0000;
          text-transform: uppercase;
        }
    </style>
</head>
<body>

    <p>Se puede usar el pseudo-elemento ::first-line para añadir efectos a la primera línea del texto. Más texto. Los navegadores tienen comportamientos distintos a la hora de utilizar los pseudo-elementos y habrá que tener en cuenta este hecho.</p>

</body>
</html>
