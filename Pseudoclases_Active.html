<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>La pseudo-clase dinámica :active</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    p {
      background-color: white;
      color: black;
    }

    p:active {
      background-color: black;
      color: white;
    }
  </style>
</head>

<body>
  <p>Este párrafo está escrito en negro sobre blanco, pero cuando se hace clic en él, se muestra de color blanco sobre fondo negro.</p>
</body>
</html>
