<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Letter-spacing</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    h1 {
      letter-spacing: 10px;
    }

    h2 {
      letter-spacing: -5px;
    }
</style>
</head>
<body>

<h1>Esto es un encabezado h1</h1>
<h2>Esto es un encabezado h2</h2>

</body>
</html>
