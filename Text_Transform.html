<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Text-transform</title>
<style>
    p.uppercase {
      text-transform: uppercase;
    }

    p.lowercase {
      text-transform: lowercase;
    }

    p.capitalize {
      text-transform: capitalize;
    }
</style>
</head>
<body>

<p class="uppercase">En un lugar de la Mancha de cuyo nombre no quiero acordarme.</p>
<p class="lowercase">En un lugar de la Mancha de cuyo nombre no quiero acordarme.</p>
<p class="capitalize">En un lugar de la Mancha de cuyo nombre no quiero acordarme.</p>

</body>
</html>
