<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>font</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    p.a {
      font: 15px arial, sans-serif;
    }

    p.b {
      font: italic bold 12px/30px Georgia, serif;
    }
</style>
</head>
<body>

<h1>Propiedad abreviada font</h1>

<p class="a">Esto es un párrafo. El tamaño de la fuente es 15T pixels y la familia es Arial.</p>

<p class="b">Esto es un párrafo. La fuente está establecida con los valores italic y bold, el tamaño de la fuente es de 12 pixels, el interlineado es de 30 pixels y la familia is Georgia.</p>

</body>
</html>
