<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>font-style</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    p {
      font-family: sans-serif;
      font-size: 150%;
    }
    p.normal {
      font-style: normal;
    }

    p.italic {
      font-style: italic;
    }

    p.oblique {
      font-style: oblique;
    }
</style>
</head>

<body>
  <p class="normal">Este párrafo está en estilo <strong>normal</strong>.</p>
  <p class="italic">Este párrafo está en estilo <strong>italic</strong>.</p>
  <p class="oblique">Este párrafo está en estilo <strong>oblique</strong>.</p>
</body>
</html>
