<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Max-width</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
div.ex1 {
  width:500px;
  margin: auto;
  border: 3px solid rgb(255,0,0);
}

div.ex2 {
  max-width:500px;
  margin: auto;
  border: 3px solid rgb(255,0,0);
}
</style>
</head>
<body>

<div class="ex1">Este div tiene establecido un width de 500px;</div>
<br>

<div class="ex2">Este div tiene establecido max-width de 500px;</div>

<p><strong>Nota:</strong> Para ver la diferencia en el comportamiento de los dos divs es necesario redimensionar la ventana y hacerla menor de 500px</p>

</body>
</html>
