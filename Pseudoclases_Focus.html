<!DOCTYPE html>
<html>
<head>
    <style>
        input {
          width: 100px;
        }
        input:focus {
          width: 250px;
        }
    </style>
</head>
<body>
    <h1>Ejemplo de la pseudo-clase focus</h1>

    <p>La caja de texto tiene un ancho de 100 pixeles. Sin embargo, cuando tiene el foco el ancho aumenta a 250 pixeles</p>

    Buscar: <input type="text" name="buscar">

</body>
</html>
