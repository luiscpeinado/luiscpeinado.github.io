<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Opacity.</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
      img {
          width: 33%;
      }

      img.poco {
          opacity: 0.2;
      }

      img.medio {
          opacity: 0.5;
      }

  </style>
</head>

<body>

    <img src="images/img_forest.jpg" class="poco" alt="poco">
    <img src="images/img_forest.jpg" class="medio" alt="medio">
    <img src="images/img_forest.jpg" alt="mucho">

</body>
</html>
