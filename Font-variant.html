<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>font-variant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
p.normal {
  font-variant: normal;
}

p.small {
  font-variant: small-caps;
}
</style>
</head>
<body>

<p class="normal">Larga vida al Rock.</p>
<p class="small">Larga vida al Rock.</p>

</body>
</html>
