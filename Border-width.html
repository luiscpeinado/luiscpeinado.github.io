<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Border-width</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
p.one {
  border-style: solid;
  border-width: 5px;
}

p.two {
  border-style: solid;
  border-width: medium;
}

p.three {
  border-style: dotted;
  border-width: 2px;
}

p.four {
  border-style: dotted;
  border-width: thick;
}

p.five {
  border-style: double;
  border-width: 15px;
}

p.six {
  border-style: double;
  border-width: thick;
}

p.seven {
  border-style: solid;
  border-width: 2px 10px 4px 20px;
}
</style>
</head>
<body>

<h2>The border-width Property</h2>
<p>This property specifies the width of the four borders:</p>

<p class="one">Borde de 5px.</p>
<p class="two">Borde medium.</p>
<p class="three">Borde de 2px.</p>
<p class="four">Borde thick.</p>
<p class="five">Borde de 15px.</p>
<p class="six">Borde thick.</p>
<p class="seven">Borde superior de 2px, derecho de 10px, inferior de 4px e izquierdo de 20px.</p>

</body>
</html>
