<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Márgenes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
div.individual {
  border: 1px solid black;
  margin: 25px 50px 75px 100px;
  background-color: lightblue;
}
div.abreviado {
  border: 1px solid black;
  margin: 25px;
  background-color: lightblue;
}
</style>
</head>
<body>

<h2>The margin shorthand property - 4 values</h2>

<div class="individual">This div element has a top margin of 25px, a right margin of 50px, a bottom margin of 75px, and a left margin of 100px.</div>

<div class="abreviado">This div element has a top, bottom, left, and right margin of 25px.</div>

<hr>

</body>
</html>
