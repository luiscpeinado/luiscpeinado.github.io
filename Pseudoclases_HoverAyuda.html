<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>La pseudo-clase dinámica: hover</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
    p {
      display: none;
      background-color: yellow;
      padding: 20px;
    }

    div:hover p {
      display: block;
    }
    </style>
</head>
<body>

<div>Si se pasa el ratón sobre el texto aparece un cuadro con otro texto.
  <p>Puede utilizarse para mostrar algún tipo de ayuda</p>
</div>

</body>
</html>
