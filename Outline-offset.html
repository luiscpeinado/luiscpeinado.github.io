<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Outline</title>
<style>
    p {
      margin: 30px;
      background:yellow;
      border: 1px solid black;
      outline: 1px solid red;
      outline-offset: 15px;
    }
</style>
</head>
<body>

<h2>La propiedad outline-offset</h2>

<p>Este párrafo tiene un outline de 15px.</p>

</body>
</html>
