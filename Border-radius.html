<!DOCTYPE html>
<html>
<head>
<style>
p[class] {
  padding: 10px;
}

p.normal {
  border: 2px solid red;
}

p.round1 {
  border: 2px solid red;
  border-top-right-radius: 15px;
}

p.round2 {
  border: 2px solid red;
  border-top-right-radius: 15px;
  border-bottom-left-radius: 40px;
}

p.round3 {
  border: 2px solid red;
  border-radius: 12px;
}

</style>
</head>

<body>

<h2>La propiedad border-radius </h2>
<p>Esta propiedad se utiliza para redondear los bordes de un elemento:</p>

<p class="normal">Borde normal</p>
<p class="round1">Una esquina redondeada</p>
<p class="round2">Esquinas redondeadas con diferente radio</p>
<p class="round3">Todas las esquinas con el mismo radio</p>

</body>
</html>
