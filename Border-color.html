<!DOCTYPE html>
<html>
<head>
    <style>
    p.one {
      border-style: solid;
      border-color: red;
    }

    p.two {
      border-style: solid;
      border-color: green;
    } 

    p.three {
      border-style: solid;
      border-color: red green blue yellow;
    } 
    </style>
</head>
<body>

    <h2>The border-color Property</h2>
    <p>This property specifies the color of the four borders:</p>

    <p class="one">Borde sólido rojo.</p>
    <p class="two">Borde sólido verde</p>
    <p class="three">Borde sólido multicolor</p>

</body>
</html>
