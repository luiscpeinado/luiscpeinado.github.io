<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">

    <title>GRID CSS</title>
    <style>
        header {
            background-color: cornsilk;

        }
        body {margin: 0;}
        article {
            background: azure;
            border: 2px solid black;
            display: grid;
            grid-template-columns: repeat(3, 120px);
            grid-template-rows: repeat(3, 80px);
            grid-gap: 2px;
            justify-items: ;
            align-items: stretch;
            justify-content:;
        }
        
        section {
            border: 1px solid; 
            background-color: beige
        }
        
        footer {
            width: 150px;
            background-color: lightgoldenrodyellow;
        }
    </style>
</head>
<body>
    <header>GRID CSS</header>
    <article>
        <section>
            Sección 1.
        </section>
        <section>
            Sección 2.
        </section>
        <section>
            Sección 3.
        </section>
        <section>
            Sección 4.
        </section>
        <section>
            Sección 5.
        </section>
        <section>
            Sección 6.
        </section>
        <section>
            Sección 7.
        </section>
        <section>
            Sección 8.
        </section>
        <section>
            Sección 9.
        </section>
    </article>
    <footer>Pie de página: 150px</footer>
</body>
</html>
